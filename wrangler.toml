name = "gbo-cafeteria-menu"
main = "src/index.ts"
compatibility_date = "2026-04-26"
preview_urls = true

[[kv_namespaces]]
binding = "MENU_STORE"
id = "c5037d8b0cab4e06bd96e69bb9919cce"

# Weekday channel post. Cron runs in UTC.
# 13:00 UTC = 9:00 EDT / 8:00 EST. Bump to "0 14 * * 1-5" during EST if you care.
[triggers]
crons = ["0 13 * * 1-5"]

[observability.logs]
enabled = true
invocation_logs = true

# Plain-text vars (visible in toml + dashboard, override the in-code default).
# LLM_MODEL switches the Anthropic model used by parseCafeteriaMenuWithLlm
# without re-deploying — bump to claude-haiku-4-6-* / claude-sonnet-4-6-* etc.
[vars]
LLM_MODEL = "claude-haiku-4-5-20251001"

# Set this to the exact cafeteria sender address in Cloudflare dashboard vars
# or with `wrangler secret put ALLOWED_SENDER`.
# ALLOWED_SENDER = "cafeteria@example.com"
